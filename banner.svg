<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="50%" style="stop-color:#0f2027"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a8dadc"/>
      <stop offset="100%" style="stop-color:#457b9d"/>
    </linearGradient>
    <linearGradient id="pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f4a4b8"/>
      <stop offset="100%" style="stop-color:#e63946"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- Animated grid lines -->
  <g opacity="0.08" stroke="#a8dadc" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="150" x2="900" y2="150"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="250" x2="900" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
    <line x1="800" y1="0" x2="800" y2="300"/>
  </g>

  <!-- Floating particles -->
  <circle cx="50" cy="80" r="2" fill="#a8dadc" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cy" values="80;60;80" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="820" cy="120" r="2" fill="#f4a4b8" opacity="0.6" filter="url(#glow)">
    <animate attributeName="cy" values="120;100;120" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="880" cy="200" r="1.5" fill="#a8dadc" opacity="0.5">
    <animate attributeName="cy" values="200;185;200" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="220" r="1.5" fill="#f4a4b8" opacity="0.5">
    <animate attributeName="cy" values="220;205;220" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- LEFT SIDE: Bar chart animated -->
  <g transform="translate(40, 80)">
    <!-- Chart bars -->
    <rect x="0" y="120" width="18" height="0" fill="#457b9d" opacity="0.9" rx="2">
      <animate attributeName="y" values="120;50;120" dur="4s" repeatCount="indefinite" begin="0s"/>
      <animate attributeName="height" values="0;70;0" dur="4s" repeatCount="indefinite" begin="0s"/>
    </rect>
    <rect x="24" y="120" width="18" height="0" fill="#a8dadc" opacity="0.9" rx="2">
      <animate attributeName="y" values="120;30;120" dur="4s" repeatCount="indefinite" begin="0.3s"/>
      <animate attributeName="height" values="0;90;0" dur="4s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
    <rect x="48" y="120" width="18" height="0" fill="#457b9d" opacity="0.9" rx="2">
      <animate attributeName="y" values="120;65;120" dur="4s" repeatCount="indefinite" begin="0.6s"/>
      <animate attributeName="height" values="0;55;0" dur="4s" repeatCount="indefinite" begin="0.6s"/>
    </rect>
    <rect x="72" y="120" width="18" height="0" fill="#a8dadc" opacity="0.9" rx="2">
      <animate attributeName="y" values="120;20;120" dur="4s" repeatCount="indefinite" begin="0.9s"/>
      <animate attributeName="height" values="0;100;0" dur="4s" repeatCount="indefinite" begin="0.9s"/>
    </rect>
    <rect x="96" y="120" width="18" height="0" fill="#f4a4b8" opacity="0.9" rx="2">
      <animate attributeName="y" values="120;40;120" dur="4s" repeatCount="indefinite" begin="1.2s"/>
      <animate attributeName="height" values="0;80;0" dur="4s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <!-- baseline -->
    <line x1="0" y1="121" x2="120" y2="121" stroke="#a8dadc" stroke-width="1" opacity="0.4"/>
    <text x="0" y="138" font-family="monospace" font-size="8" fill="#a8dadc" opacity="0.6">Sales Analytics</text>
  </g>

  <!-- RIGHT SIDE: Line chart animated -->
  <g transform="translate(700, 60)">
    <polyline points="0,100 30,70 60,85 90,40 120,55 150,20 180,35" 
              fill="none" stroke="#a8dadc" stroke-width="2" opacity="0" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite"/>
    </polyline>
    <!-- dots on line -->
    <circle cx="0" cy="100" r="3" fill="#a8dadc" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0s"/>
    </circle>
    <circle cx="30" cy="70" r="3" fill="#a8dadc" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0.2s"/>
    </circle>
    <circle cx="60" cy="85" r="3" fill="#f4a4b8" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0.4s"/>
    </circle>
    <circle cx="90" cy="40" r="3" fill="#a8dadc" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0.6s"/>
    </circle>
    <circle cx="120" cy="55" r="3" fill="#f4a4b8" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="0.8s"/>
    </circle>
    <circle cx="150" cy="20" r="3" fill="#a8dadc" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <line x1="0" y1="121" x2="180" y2="121" stroke="#a8dadc" stroke-width="1" opacity="0.4"/>
    <text x="0" y="138" font-family="monospace" font-size="8" fill="#a8dadc" opacity="0.6">KPI Trends</text>
  </g>

  <!-- GIRL character (CSS art style) -->
  <g transform="translate(590, 35)">
    <!-- Monitor -->
    <rect x="30" y="140" width="110" height="75" rx="5" fill="#1a1a2e" stroke="#a8dadc" stroke-width="1.5" opacity="0.9"/>
    <rect x="38" y="148" width="94" height="58" rx="2" fill="#0d1117"/>
    <!-- Screen content - mini chart on monitor -->
    <polyline points="45,190 55,178 65,183 75,168 85,172 95,158 105,162 115,150 125,154" 
              fill="none" stroke="#a8dadc" stroke-width="1.5" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <!-- Monitor stand -->
    <rect x="78" y="215" width="14" height="12" fill="#1a1a2e" stroke="#a8dadc" stroke-width="1"/>
    <rect x="65" y="226" width="40" height="5" rx="2" fill="#1a1a2e" stroke="#a8dadc" stroke-width="1"/>
    <!-- Desk -->
    <rect x="10" y="231" width="155" height="6" rx="3" fill="#1e2a3a" stroke="#457b9d" stroke-width="1"/>

    <!-- Girl body -->
    <!-- Chair -->
    <rect x="68" y="218" width="34" height="8" rx="3" fill="#2d3561" opacity="0.8"/>
    <!-- Torso -->
    <rect x="72" y="175" width="26" height="42" rx="8" fill="#f4a4b8"/>
    <!-- Clothing - top -->
    <rect x="72" y="185" width="26" height="32" rx="6" fill="#457b9d"/>
    <!-- Arms -->
    <!-- Left arm reaching to keyboard -->
    <path d="M72 195 Q55 205 50 220" stroke="#f4a4b8" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Right arm reaching to keyboard -->
    <path d="M98 195 Q115 205 120 220" stroke="#f4a4b8" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="50" cy="221" r="5" fill="#f4a4b8"/>
    <circle cx="120" cy="221" r="5" fill="#f4a4b8"/>
    <!-- Keyboard -->
    <rect x="48" y="225" width="74" height="10" rx="3" fill="#2d3561" stroke="#a8dadc" stroke-width="0.8"/>

    <!-- Head -->
    <circle cx="85" cy="165" r="22" fill="#f4a4b8"/>
    <!-- Hair - long dark hair -->
    <ellipse cx="85" cy="153" rx="23" ry="14" fill="#2d1b4e"/>
    <!-- Hair sides flowing down -->
    <path d="M63 160 Q55 185 58 210" stroke="#2d1b4e" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M107 160 Q115 185 112 210" stroke="#2d1b4e" stroke-width="10" fill="none" stroke-linecap="round"/>
    <!-- Hair top detail -->
    <ellipse cx="85" cy="148" rx="20" ry="10" fill="#3d2b6e"/>
    <!-- Face -->
    <!-- Eyes -->
    <ellipse cx="78" cy="167" rx="4" ry="4.5" fill="white"/>
    <ellipse cx="92" cy="167" rx="4" ry="4.5" fill="white"/>
    <circle cx="79" cy="168" r="2.5" fill="#2d1b4e"/>
    <circle cx="93" cy="168" r="2.5" fill="#2d1b4e"/>
    <!-- Eye shine -->
    <circle cx="80" cy="167" r="1" fill="white"/>
    <circle cx="94" cy="167" r="1" fill="white"/>
    <!-- Eyelashes -->
    <path d="M74 163 Q78 160 82 163" stroke="#2d1b4e" stroke-width="1.2" fill="none"/>
    <path d="M88 163 Q92 160 96 163" stroke="#2d1b4e" stroke-width="1.2" fill="none"/>
    <!-- Blush -->
    <ellipse cx="73" cy="172" rx="5" ry="3" fill="#e63946" opacity="0.3"/>
    <ellipse cx="97" cy="172" rx="5" ry="3" fill="#e63946" opacity="0.3"/>
    <!-- Smile -->
    <path d="M79 176 Q85 181 91 176" stroke="#c0617a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Headphones -->
    <path d="M63 162 Q63 143 85 143 Q107 143 107 162" stroke="#457b9d" stroke-width="4" fill="none"/>
    <rect x="59" y="160" width="8" height="12" rx="3" fill="#457b9d"/>
    <rect x="103" y="160" width="8" height="12" rx="3" fill="#457b9d"/>

    <!-- Floating data elements around girl -->
    <!-- SQL bubble -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="0s"/>
      <rect x="120" y="145" width="38" height="18" rx="9" fill="#457b9d" opacity="0.9"/>
      <text x="128" y="158" font-family="monospace" font-size="9" fill="white" font-weight="bold">SQL ✓</text>
    </g>
    <!-- Python bubble -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
      <rect x="25" y="148" width="52" height="18" rx="9" fill="#3776AB" opacity="0.9"/>
      <text x="30" y="161" font-family="monospace" font-size="9" fill="white" font-weight="bold">Python 🐍</text>
    </g>
    <!-- BI bubble -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="2s"/>
      <rect x="118" y="170" width="52" height="18" rx="9" fill="#F2C811" opacity="0.9"/>
      <text x="123" y="183" font-family="monospace" font-size="9" fill="#0d1117" font-weight="bold">Power BI 📊</text>
    </g>
  </g>

  <!-- CENTER TEXT -->
  <g transform="translate(210, 0)">
    <!-- Name -->
    <text x="0" y="110" font-family="Georgia, serif" font-size="36" font-weight="bold" fill="white" filter="url(#softglow)">
      Ayshan Adigozalova
      <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
    </text>
    <!-- Subtitle with gradient feel -->
    <text x="2" y="138" font-family="monospace" font-size="15" fill="url(#teal)">
      ✦ Data Analyst ✦
      <animate attributeName="opacity" values="0;1" dur="1.5s" fill="freeze"/>
    </text>
    <!-- Tech stack line -->
    <text x="2" y="162" font-family="monospace" font-size="12" fill="#cdd6f4" opacity="0.8">
      SQL  ·  Python  ·  Power BI  ·  Excel
      <animate attributeName="opacity" values="0;0.8" dur="2s" fill="freeze"/>
    </text>
    <!-- Tagline -->
    <text x="2" y="188" font-family="Georgia, serif" font-size="11" fill="#a8dadc" opacity="0.7" font-style="italic">
      "Rəqəmlər danışır — mən hekayəni tapıram"
      <animate attributeName="opacity" values="0;0.7" dur="2.5s" fill="freeze"/>
    </text>

    <!-- Animated underline -->
    <line x1="0" y1="145" x2="0" y2="145" stroke="url(#teal)" stroke-width="2" opacity="0.6">
      <animate attributeName="x2" values="0;320" dur="1.5s" fill="freeze" begin="0.5s"/>
    </line>
  </g>

  <!-- Floating numbers/data points -->
  <text x="170" y="40" font-family="monospace" font-size="10" fill="#a8dadc" opacity="0">
    SELECT * FROM insights
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite" begin="0s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-15" dur="5s" repeatCount="indefinite"/>
  </text>
  <text x="350" y="260" font-family="monospace" font-size="10" fill="#f4a4b8" opacity="0">
    df.groupby('revenue').sum()
    <animate attributeName="opacity" values="0;0.4;0" dur="5s" repeatCount="indefinite" begin="2s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-15" dur="5s" repeatCount="indefinite" begin="2s"/>
  </text>
  <text x="500" y="35" font-family="monospace" font-size="10" fill="#a8dadc" opacity="0">
    KPI: +24% ↑
    <animate attributeName="opacity" values="0;0.5;0" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-12" dur="4s" repeatCount="indefinite" begin="1s"/>
  </text>

  <!-- Bottom border glow -->
  <line x1="0" y1="298" x2="900" y2="298" stroke="url(#teal)" stroke-width="2" opacity="0.5"/>
</svg>
